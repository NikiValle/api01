<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CRUD JSON</title>
</head>
<body>

<h2>Inserisci nuovo record</h2>
<input type="text" id="nome" placeholder="Nome">
<input type="number" id="valore" placeholder="Valore">
<button onclick="crea()">Crea</button>

<h2>Elenco dati</h2>
<button onclick="carica()">Carica Dati</button>
<ul id="lista"></ul>
<script>
const API = "api.php";

// ================= CREATE =================
function crea(){
    fetch(API, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            nome: document.getElementById("nome").value,
            valore: document.getElementById("valore").value
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Creato ID: " + data.id);
        carica();
    });
}

// ================= READ =================
function carica(){
    fetch(API)
    .then(res => res.json())
    .then(data => {
        let lista = document.getElementById("lista");
        lista.innerHTML = "";
        data.forEach(item => {
            lista.innerHTML += `
                <li>
                    ${item.id} - ${item.nome} - ${item.valore}
                    <button onclick="modifica(${item.id})">Modifica</button>
                    <button onclick="elimina(${item.id})">Elimina</button>
                </li>
            `;
        });
    });
}
carica();
// ================= DELETE =================
function elimina(id){
    fetch(API + "?id=" + id, {
        method: "DELETE"
    })
    .then(res => res.json())
    .then(() => carica());
}
// ================= UPDATE =================
function modifica(id){

    // Chiedo i nuovi valori
    let nuovoNome = prompt("Nuovo nome:");
    let nuovoValore = prompt("Nuovo valore:");

    if(nuovoNome === null || nuovoValore === null){
        return; // annulla se premi cancel
    }

    fetch(API + "?id=" + id, {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            nome: nuovoNome,
            valore: nuovoValore
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Record aggiornato!");
        carica();
    });
}
</script>
</body>
</html>
